<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RUMO • Painel</title>
    <link rel="stylesheet" href="rumo.css">
    <style>
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .valor { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .barra { width: 100%; height: 25px; background: #334155; border-radius: 12px; margin: 15px 0; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        #progresso { height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
        .destaque { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="theme-switch" onclick="toggleTema()">🌓</div>

<div class="container">
    <h1>Painel de Desempenho</h1>

    <div class="card">
        <span class="label">Progresso Real da Semana</span>
        <div class="barra">
            <div id="progresso"></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span id="porcentagem-texto" style="font-weight: bold;">0%</span>
            <span id="status-meta" style="font-size: 0.9rem;">Calculando...</span>
        </div>
    </div>

    <div class="status-grid">
        <div class="card">
            <span class="label">Total Ganho</span>
            <span id="ganhos" class="valor">R$ 0</span>
        </div>
        <div class="card">
            <span class="label">Meta Semanal</span>
            <span id="meta-total" class="valor" style="color: var(--text-dim);">R$ 0</span>
        </div>
    </div>

    <div style="text-align: center; margin-top: 40px; color: var(--text-dim);">
        Hoje é <span id="dia-atual" class="destaque">...</span> | 
        Meta esperada p/ hoje: <span id="meta-esperada" class="destaque">R$ 0</span>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <button onclick="window.location.href='index.html'">Voltar ao Menu</button>
    </div>
</div>

<script>
    function toggleTema() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    function atualizar() {
        fetch("/status")
            .then(r => r.json())
            .then(d => {
                const diasSemana = ["DOMINGO", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
                const diaIndex = new Date().getDay();
                const nomeDia = diasSemana[diaIndex];
                
                // Ajuste: Segunda no JS é 1. Se trabalhas 5 dias, fator é diaIndex.
                let fatorDia = diaIndex === 0 ? d.dias : Math.min(diaIndex, d.dias);
                let metaHoje = (d.meta / d.dias) * fatorDia;

                document.getElementById("dia-atual").innerText = nomeDia;
                document.getElementById("ganhos").innerText = "R$ " + d.ganhos.toFixed(2);
                document.getElementById("meta-total").innerText = "R$ " + d.meta.toFixed(2);
                document.getElementById("meta-esperada").innerText = "R$ " + metaHoje.toFixed(2);

                let pctSemana = d.meta > 0 ? (d.ganhos / d.meta) * 100 : 0;
                let pctDesempenho = metaHoje > 0 ? (d.ganhos / metaHoje) * 100 : 0;

                const barra = document.getElementById("progresso");
                const txtPct = document.getElementById("porcentagem-texto");
                const txtStatus = document.getElementById("status-meta");

                // A barra mostra quanto da meta SEMANAL você já fez
                barra.style.width = Math.min(pctSemana, 100) + "%";
                txtPct.innerText = pctSemana.toFixed(1) + "% da semana";

                // A cor da barra e o status dependem se você está no ritmo para hoje
                if (diaIndex === 0) { // Domingo
                    if (pctSemana >= 100) { barra.className = "verde"; txtStatus.innerText = "Meta Batida! 🎉"; }
                    else { barra.className = "vermelho"; txtStatus.innerText = "Meta Não Atingida"; }
                } else {
                    if (pctDesempenho >= 99 && pctDesempenho <= 105) {
                        barra.className = "amarelo"; txtStatus.innerText = "No Ritmo (Justo)";
                    } else if (pctDesempenho > 105) {
                        barra.className = "verde"; txtStatus.innerText = "Acima do Esperado! 🚀";
                    } else {
                        barra.className = "vermelho"; txtStatus.innerText = "Abaixo do Ritmo";
                    }
                }
            });
    }
    atualizar();
</script>
</body>
</html>
