<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RUMO • Painel</title>
    <link rel="stylesheet" href="rumo.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .valor { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .barra { width: 100%; height: 25px; background: #1e293b; border-radius: 12px; margin: 15px 0; overflow: hidden; border: 2px solid rgba(255,255,255,0.05); }
        #progresso { height: 100%; width: 0%; transition: width 0.8s ease; }
        .verde { background-color: #22c55e !important; box-shadow: 0 0 10px rgba(34,197,94,0.4); }
        .amarelo { background-color: #eab308 !important; box-shadow: 0 0 10px rgba(234,179,8,0.4); }
        .vermelho { background-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239,68,68,0.4); }
        .destaque { color: var(--accent); font-weight: bold; }
        canvas { max-height: 250px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="theme-switch" onclick="toggleTema()">🌓</div>
<div class="container">
    <h1>Painel de Desempenho</h1>
    <div class="card">
        <span class="label">Evolução dos Ganhos</span>
        <canvas id="graficoGanhos"></canvas>
    </div>
    <div class="card" style="margin-top:20px">
        <span class="label">Progresso da Semana</span>
        <div class="barra"><div id="progresso"></div></div>
        <div style="display:flex; justify-content:space-between">
            <span id="porcentagem-texto" style="font-weight:bold">0%</span>
            <span id="status-meta" style="font-size:0.9rem">Calculando...</span>
        </div>
    </div>
    <div class="status-grid">
        <div class="card"><span class="label">Total Ganho</span><span id="ganhos" class="valor">R$ 0</span></div>
        <div class="card"><span class="label">Meta Semanal</span><span id="meta-total" class="valor">R$ 0</span></div>
    </div>
    <div style="text-align:center; margin-top:30px; color:var(--text-dim)">
        Hoje é <span id="dia-atual" class="destaque">...</span> | Meta p/ hoje: <span id="meta-esperada" class="destaque">R$ 0</span>
    </div>
    <div style="text-align:center; margin-top:30px"><button onclick="window.location.href='index.html'">Voltar</button></div>
</div>
<script>
    function toggleTema() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    let meuGrafico = null;
    function renderGrafico(historico) {
        const ctx = document.getElementById('graficoGanhos').getContext('2d');
        const ultimos7 = historico.slice(-7);
        if(meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ultimos7.map(d => d.data.split('-').reverse().slice(0,2).join('/')),
                datasets: [{ label: 'R$', data: ultimos7.map(d => d.valor), borderColor: '#38bdf8', tension: 0.3, fill: true, backgroundColor: 'rgba(56,189,248,0.1)' }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function atualizar() {
        fetch("/status").then(r => r.json()).then(d => {
            const diasSemana = ["DOMINGO", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
            const diaIndex = new Date().getDay();
            let fatorDia = diaIndex === 0 ? d.dias : Math.min(diaIndex, d.dias);
            let metaHoje = (d.meta / d.dias) * fatorDia;
            document.getElementById("dia-atual").innerText = diasSemana[diaIndex];
            document.getElementById("ganhos").innerText = "R$ " + d.ganhos.toFixed(2);
            document.getElementById("meta-total").innerText = "R$ " + d.meta.toFixed(2);
            document.getElementById("meta-esperada").innerText = "R$ " + metaHoje.toFixed(2);

            let pctSem = d.meta > 0 ? (d.ganhos/d.meta)*100 : 0;
            let pctDes = metaHoje > 0 ? (d.ganhos/metaHoje)*100 : 0;
            const b = document.getElementById("progresso");
            b.style.width = Math.min(pctSem, 100) + "%";
            document.getElementById("porcentagem-texto").innerText = pctSem.toFixed(1) + "%";
            
            if (pctDes >= 99 && pctDes <= 105) { b.className = "amarelo"; document.getElementById("status-meta").innerText = "No Ritmo"; }
            else if (pctDes > 105) { b.className = "verde"; document.getElementById("status-meta").innerText = "Voando! 🚀"; }
            else { b.className = "vermelho"; document.getElementById("status-meta").innerText = "Abaixo do Ritmo"; }
        });
        fetch("/historico-geral").then(r => r.json()).then(renderGrafico);
    }
    atualizar();
</script>
</body>
</html>
