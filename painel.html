<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RUMO • Painel</title>
    <link rel="stylesheet" href="rumo.css">
    <style>
        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        .valor { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .info-hoje { margin-top: 15px; font-size: 0.9rem; color: var(--text-dim); }
        .destaque { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body id="corpo">

<div class="theme-switch" onclick="toggleTema()">🌓</div>

<div class="container">
    <h1>Painel de Desempenho</h1>

    <div class="card">
        <span class="label" id="titulo-progresso">Progresso da Meta</span>
        <div class="barra">
            <div id="progresso"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
            <span id="porcentagem-texto" style="font-weight: bold; font-size: 1.2rem;">0%</span>
            <span id="meta-acumulada-texto" style="color: var(--text-dim);">Meta esperada: R$ 0</span>
        </div>
        <p class="info-hoje">Hoje é <span id="dia-atual" class="destaque">...</span></p>
    </div>

    <div class="status-grid">
        <div class="card">
            <span class="label">Total Ganho</span>
            <span id="ganhos" class="valor">R$ 0</span>
        </div>
        <div class="card">
            <span class="label">Meta Semanal</span>
            <span id="meta-total" class="valor" style="color: var(--text-dim);">R$ 0</span>
        </div>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <button onclick="window.location.href='index.html'">Voltar ao Menu</button>
    </div>
</div>

<script>
    function toggleTema() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    function atualizar() {
        fetch("/semana")
            .then(r => r.json())
            .then(data => {
                const diasSemana = ["DOMINGO", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
                const dataHoje = new Date();
                const diaIndex = dataHoje.getDay(); // 0 (Dom) a 6 (Sab)
                const nomeDia = diasSemana[diaIndex];
                
                document.getElementById("dia-atual").innerText = nomeDia;

                // 1. Calcular total ganho
                let totalGanho = data.ganhos.reduce((acc, curr) => acc + (curr.valor || 0), 0);
                
                // 2. Calcular Meta Acumulada até HOJE
                // Consideramos que a meta é dividida pelos dias trabalhados (data.dias)
                // Se for domingo (0), a meta acumulada é 100%
                let fatorDia = diaIndex === 0 ? data.dias : Math.min(diaIndex, data.dias);
                let metaEsperadaAteHoje = (data.meta / data.dias) * fatorDia;

                // 3. Lógica de Porcentagem e Cores
                // Comparamos o ganho com a meta que deveríamos ter HOJE
                let porcentagemDesempenho = metaEsperadaAteHoje > 0 ? (totalGanho / metaEsperadaAteHoje) * 100 : 0;
                
                // Exibição na tela
                document.getElementById("ganhos").innerText = "R$ " + totalGanho.toFixed(2);
                document.getElementById("meta-total").innerText = "R$ " + data.meta.toFixed(2);
                document.getElementById("meta-acumulada-texto").innerText = "Meta p/ " + nomeDia + ": R$ " + metaEsperadaAteHoje.toFixed(0);
                
                const barra = document.getElementById("progresso");
                const textoPct = document.getElementById("porcentagem-texto");
                
                // A barra mostra o progresso em relação à meta SEMANAL total
                let progressoRealSemana = (totalGanho / data.meta) * 100;
                barra.style.width = Math.min(progressoRealSemana, 100) + "%";
                textoPct.innerText = porcentagemDesempenho.toFixed(1) + "% da meta diária";

                // CORES (Baseado no seu pedido)
                if (diaIndex === 0) { // Domingo
                    if (porcentagemDesempenho >= 100) {
                        barra.className = "verde";
                        textoPct.style.color = "var(--success)";
                    } else {
                        barra.className = "vermelho";
                        textoPct.style.color = "var(--danger)";
                    }
                } else { // Outros dias
                    if (porcentagemDesempenho >= 99 && porcentagemDesempenho <= 105) {
                        barra.className = "amarelo";
                        textoPct.style.color = "var(--warning)";
                    } else if (porcentagemDesempenho > 105) {
                        barra.className = "verde";
                        textoPct.style.color = "var(--success)";
                    } else {
                        barra.className = "vermelho";
                        textoPct.style.color = "var(--danger)";
                    }
                }
            });
    }

    atualizar();
</script>
</body>
</html>
