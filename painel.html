<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUMO • Performance iPad</title>
    <style>
        /* OTIMIZADO PARA IPAD 1 (SAFARI 5.1.1) */
        * { box-sizing: border-box; -webkit-box-sizing: border-box; } /* Crucial para alinhamento */
        
        body { 
            background-color: #f1f5f9; 
            color: #1e293b; 
            font-family: Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 15px;
        }
        .container { 
            width: 100%; 
            margin: 0 auto; 
            max-width: 850px; 
        }
        
        h1 { color: #0284c7; font-size: 38px; margin: 10px 0 20px 0; font-weight: bold; }
        
        .card { 
            background-color: #ffffff; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #cbd5e1;
            box-shadow: 1px 1px 3px #ccc;
            width: 100%; /* Garante largura total */
        }

        /* Barra de Progresso */
        .bar-container { 
            background-color: #e2e8f0; 
            height: 55px; 
            border-radius: 27px; 
            margin: 15px 0; 
            overflow: hidden; 
            border: 1px solid #94a3b8;
        }
        #bar { 
            height: 100%; 
            width: 0%; 
            background-color: #94a3b8;
            border-radius: 27px;
        }

        .bg-verde { background-color: #22c55e !important; }
        .bg-amarelo { background-color: #eab308 !important; }
        .bg-vermelho { background-color: #ef4444 !important; }

        .label { color: #64748b; text-transform: uppercase; font-size: 13px; font-weight: bold; display: block; }
        .valor { font-size: 32px; font-weight: bold; display: block; margin-top: 5px; color: #0f172a; }
        
        .status-msg { font-size: 18px; font-weight: bold; margin-top: 10px; }
        .text-verde { color: #16a34a; }
        .text-amarelo { color: #ca8a04; }
        .text-vermelho { color: #dc2626; }

        /* Tabela de Alinhamento perfeita */
        .tabela-ajuste { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 0px; 
            table-layout: fixed; 
        }
        .tabela-ajuste td { 
            vertical-align: top; 
            padding: 0; 
        }
        /* Espaçamento interno entre os cards sem afetar as bordas externas */
        .td-esq { padding-right: 8px; }
        .td-dir { padding-left: 8px; }

        .btn { 
            display: block; 
            padding: 22px; 
            background-color: #0284c7; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 10px; 
            font-size: 22px; 
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SISTEMA RUMO</h1>

        <div class="card">
            <small class="label" id="dia-texto">CARREGANDO...</small>
            <div class="bar-container">
                <div id="bar"></div>
            </div>
            <div id="pct-texto" style="font-size: 28px; font-weight: bold;">0%</div>
            <div id="status-desc" class="status-msg">---</div>
        </div>

        <table class="tabela-ajuste">
            <tr>
                <td class="td-esq">
                    <div class="card">
                        <small class="label">Projeção</small>
                        <span class="valor" id="proj-v">R$ 0</span>
                    </div>
                </td>
                <td class="td-dir">
                    <div class="card">
                        <small class="label">Real</small>
                        <span class="valor" id="real-v">R$ 0</span>
                    </div>
                </td>
            </tr>
        </table>

        <div class="card">
            <small class="label">Meta Total da Semana</small>
            <span class="valor" id="meta-v" style="color: #0284c7; font-size: 40px;">R$ 0</span>
        </div>

        <a href="ganhos.html" class="btn">VOLTAR PARA REGISTROS</a>
    </div>

    <script type="text/javascript">
        function carregarPainel() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/status', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var dados = JSON.parse(xhr.responseText);
                    
                    var agora = new Date();
                    var diaSemana = agora.getDay(); 
                    var diasPassados = (diaSemana === 0) ? 7 : diaSemana; 
                    
                    var diasDeCalculo = diasPassados;
                    if (diasDeCalculo > dados.dias) diasDeCalculo = dados.dias;
                    
                    var metaProjetada = (dados.meta / dados.dias) * diasDeCalculo;
                    var ganhoReal = dados.ganhos;
                    
                    var performance = (ganhoReal / metaProjetada);
                    var cor = "bg-vermelho";
                    var msg = "ALERTA: RITMO BAIXO";
                    var msgClasse = "text-vermelho";

                    if (performance >= 1) {
                        cor = "bg-verde";
                        msg = "DENTRO DA META!";
                        msgClasse = "text-verde";
                    } else if (performance >= 0.85) {
                        cor = "bg-amarelo";
                        msg = "ABAIXO DA MÉDIA";
                        msgClasse = "text-amarelo";
                    }

                    var nomes = ["DOMINGO", "SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA", "SÁBADO"];
                    document.getElementById("dia-texto").innerHTML = nomes[diaSemana] + " (DIA " + diasPassados + " DE " + dados.dias + ")";
                    document.getElementById("real-v").innerHTML = "R$ " + ganhoReal.toFixed(0);
                    document.getElementById("proj-v").innerHTML = "R$ " + metaProjetada.toFixed(0);
                    document.getElementById("meta-v").innerHTML = "R$ " + dados.meta.toFixed(0);
                    
                    var pctTotal = (dados.meta > 0) ? (ganhoReal / dados.meta) * 100 : 0;
                    document.getElementById("pct-texto").innerHTML = pctTotal.toFixed(1) + "% DO TOTAL";
                    
                    var barra = document.getElementById("bar");
                    barra.style.width = (pctTotal > 100 ? 100 : pctTotal) + "%";
                    barra.className = cor;
                    
                    var desc = document.getElementById("status-desc");
                    desc.innerHTML = msg;
                    desc.className = "status-msg " + msgClasse;
                }
            };
            xhr.send();
        }
        window.onload = carregarPainel;
    </script>
</body>
</html>
