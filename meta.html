<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RUMO • Meta Semanal</title>
    <link rel="stylesheet" href="rumo.css">
</head>
<body>

<div class="container">
    <h1>Configuração</h1>

    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div style="margin-bottom: 25px; text-align: left;">
            <label style="display: block; color: var(--text-dim); margin-bottom: 8px;">Meta da Semana (R$)</label>
            <input id="meta" type="number" style="width: 100%; box-sizing: border-box; font-size: 1.2rem;" placeholder="Ex: 1000">
        </div>

        <div style="margin-bottom: 25px; text-align: left;">
            <label style="display: block; color: var(--text-dim); margin-bottom: 8px;">Dias de Trabalho</label>
            <select id="dias" style="width: 100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 6px;">
                <option value="1">1 dia</option>
                <option value="2">2 dias</option>
                <option value="3">3 dias</option>
                <option value="4">4 dias</option>
                <option value="5" selected>5 dias</option>
                <option value="6">6 dias</option>
                <option value="7">7 dias</option>
            </select>
        </div>

        <button onclick="salvar()" style="width: 100%;">Gravar Configuração</button>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="index.html" style="color: var(--text-dim); text-decoration: none;">← Cancelar e Voltar</a>
    </div>
</div>

<script>
    function salvar() {
        const meta = document.getElementById("meta").value;
        const dias = document.getElementById("dias").value;

        if(!meta || meta <= 0) {
            alert("Por favor, insira uma meta válida.");
            return;
        }

        fetch("/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                meta: parseFloat(meta),
                dias: parseInt(dias)
            })
        }).then(() => {
            alert("✅ Configuração salva!");
            window.location.href = "ganhos.html";
        });
    }
</script>

</body>
</html>
