<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RUMO • Registrar Ganhos</title>
    <link rel="stylesheet" href="rumo.css">
</head>
<body>

<div class="container">
    <h1>Controle Semanal</h1>

    <div class="topcards">
        <div class="card">
            <span>Meta Semanal</span>
            <h2 id="meta">R$ 0</h2>
        </div>
        <div class="card">
            <span>Total Ganho</span>
            <h2 id="total">R$ 0</h2>
        </div>
        <div class="card">
            <span>Progresso</span>
            <h2 id="progresso">0%</h2>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Dia</th>
                    <th>Ativo</th>
                    <th>Ganho (R$)</th>
                    <th>Meta Diária</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <button onclick="salvar()" style="font-size: 1.2rem; padding: 15px 40px;">💾 Salvar Tudo</button>
        <br><br>
        <a href="index.html" style="color: var(--text-dim); text-decoration: none;">← Voltar ao Início</a>
    </div>
</div>

<script>
    const dias = ["SEG", "TER", "QUA", "QUI", "SEX", "SAB", "DOM"];
    let ganhos = {};
    let diasAtivos = { SEG: true, TER: true, QUA: true, QUI: true, SEX: true, SAB: false, DOM: false };
    let metaSemanal = 0;

    function carregar() {
        fetch("/semana")
            .then(r => r.json())
            .then(data => {
                metaSemanal = data.meta;
                document.getElementById("meta").innerText = "R$ " + metaSemanal;
                data.ganhos.forEach(g => { ganhos[g.data] = g.valor; });
                render();
            });
    }

    function toggle(d) {
        diasAtivos[d] = !diasAtivos[d];
        render();
    }

    function editar(id) {
        const el = document.getElementById(id);
        el.disabled = false;
        el.focus();
    }

    function render() {
        let html = "";
        let total = 0;
        let ativosCount = Object.values(diasAtivos).filter(v => v).length;
        let metaBase = ativosCount > 0 ? metaSemanal / ativosCount : 0;

        dias.forEach(d => {
            let ativo = diasAtivos[d];
            let ganho = ganhos[d] || "";
            let metaDiaria = ativo ? metaBase.toFixed(0) : "-";
            if (ganho) total += Number(ganho);

            let status = "";
            if (ganho && ativo) {
                if (ganho >= metaBase) status = "<span class='status-ok'>✔</span>";
                else if (ganho >= metaBase * 0.8) status = "<span class='status-warn'>⚠</span>";
                else status = "<span class='status-bad'>✖</span>";
            }

            html += `
                <tr>
                    <td><strong>${d}</strong></td>
                    <td><input type="checkbox" ${ativo ? "checked" : ""} onclick="toggle('${d}')"></td>
                    <td>
                        <input id="g_${d}" type="number" value="${ganho}" disabled>
                        <button class="edit" onclick="editar('g_${d}')">✏</button>
                    </td>
                    <td>R$ ${metaDiaria}</td>
                    <td>${status}</td>
                </tr>`;
        });

        document.getElementById("tabela").innerHTML = html;
        document.getElementById("total").innerText = "R$ " + total;
        let progresso = metaSemanal > 0 ? ((total / metaSemanal) * 100).toFixed(0) : 0;
        document.getElementById("progresso").innerText = progresso + "%";
    }

    function salvar() {
        let lista = [];
        dias.forEach(d => {
            let v = document.getElementById("g_" + d).value;
            if (v !== "") lista.push({ data: d, valor: Number(v) });
        });

        fetch("/ganhos-em-massa", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ listaGanhos: lista })
        }).then(() => {
            alert("Dados salvos!");
            location.reload();
        });
    }

    carregar();
</script>
</body>
</html>
