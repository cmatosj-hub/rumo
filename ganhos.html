<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUMO • Ganhos</title>
    <link rel="stylesheet" href="rumo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTema()" id="themeBtn">Light Mode</button>
    <div class="container">
        <h1>Ganhos</h1>
        
        <div class="card" style="display: flex; justify-content: space-around; padding: 15px;">
            <div style="text-align: center;">
                <small>Meta Semanal</small><br>
                <input id="meta_in" type="number" onchange="salvarConfig()" style="width:90px; font-size:1.1rem; border:none; background:transparent; color:var(--accent); font-weight:600;">
            </div>
            <div style="text-align: center;">
                <small>Dias de Trabalho</small><br>
                <select id="dias_in" onchange="salvarConfig()" style="background:transparent; color:var(--text-main); border:none; font-size:1rem;">
                    <option value="4">4 dias</option><option value="5">5 dias</option><option value="6">6 dias</option><option value="7">7 dias</option>
                </select>
            </div>
        </div>

        <div class="topcards">
            <div class="card"><small>Soma</small><div id="total">R$ 0</div></div>
            <div class="card"><small>Restante</small><div id="falta" style="color:var(--danger)">R$ 0</div></div>
            <div class="card"><small>Meta Diária</small><div id="sugerido" style="color:var(--success)">R$ 0</div></div>
        </div>

        <div class="card" style="padding: 10px 20px;">
            <table>
                <thead>
                    <tr><th>Dia</th><th>OFF</th><th>Uber / 99</th><th>Total</th><th>Meta</th></tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>

        <div class="nav-footer">
            <a href="index.html" class="nav-btn btn-secondary">Início</a>
            <a href="painel.html" class="nav-btn btn-primary">Ver Painel</a>
        </div>
    </div>

    <script>
        let ganhosDB = {}, diasAtivos = {}, metaS = 0, diasT = 5, datasDaSemana = [];
        const nomesDias = ["SEG", "TER", "QUA", "QUI", "SEX", "SAB", "DOM"];

        function carregar() {
            fetch("/semana").then(r => r.json()).then(data => {
                metaS = data.meta; diasT = data.dias;
                document.getElementById("meta_in").value = metaS;
                document.getElementById("dias_in").value = diasT;
                data.ganhos.forEach(g => { ganhosDB[g.data] = {u: g.uber, p: g.p99, t: g.valor}; });
                data.ativos.forEach(a => { diasAtivos[a.data] = a.ativo === 1; });
                gerarDatas(); render();
            });
        }

        function gerarDatas() {
            datasDaSemana = []; let hoje = new Date();
            let d = hoje.getDate() - hoje.getDay() + (hoje.getDay() === 0 ? -6 : 1);
            let seg = new Date(hoje.setDate(d));
            for(let i=0; i<7; i++){
                let day = new Date(seg); day.setDate(seg.getDate()+i);
                datasDaSemana.push(day.toISOString().split('T')[0]);
            }
        }

        function render() {
            let totalG = 0, rest = 0;
            datasDaSemana.forEach(dt => {
                if(ganhosDB[dt]) totalG += ganhosDB[dt].t;
                if(diasAtivos[dt] !== false && (!ganhosDB[dt] || ganhosDB[dt].t === 0)) rest++;
            });
            let metaSug = rest > 0 ? (metaS - totalG) / rest : 0;
            if(metaSug < 0) metaSug = 0;

            let html = "";
            datasDaSemana.forEach((dt, i) => {
                let g = ganhosDB[dt] || {u:0, p:0, t:0};
                let at = diasAtivos[dt] !== false;
                let pct = metaSug > 0 ? (g.t / metaSug) * 100 : 0;
                let corBarra = pct >= 100 ? 'var(--success)' : 'var(--accent)';

                html += `<tr style="${at ? '' : 'opacity: 0.4'}">
                    <td data-label="Dia"><b>${nomesDias[i]}</b></td>
                    <td data-label="OFF"><input type="checkbox" ${at ? 'checked' : ''} onclick="toggleDia('${dt}')"></td>
                    <td data-label="Apps">
                        <div class="input-group">
                            <div style="display:flex; gap:5px; justify-content:center;">
                                <input type="number" value="${g.u||''}" placeholder="U" onchange="salvar('${dt}', this.value, ${g.p})" style="width:55px;">
                                <input type="number" value="${g.p||''}" placeholder="9" onchange="salvar('${dt}', ${g.u}, this.value)" style="width:55px;">
                            </div>
                            <div class="mini-barra-container"><div class="mini-barra" style="width:${Math.min(pct,100)}%; background:${corBarra}"></div></div>
                        </div>
                    </td>
                    <td data-label="Total">R$ ${g.t.toFixed(0)}</td>
                    <td data-label="Meta" style="color:var(--accent); font-weight:500;">R$ ${at ? metaSug.toFixed(0) : '0'}</td>
                </tr>`;
            });
            document.getElementById("tabela").innerHTML = html;
            document.getElementById("total").innerText = "R$ " + totalG.toFixed(0);
            document.getElementById("falta").innerText = "R$ " + Math.max(0, metaS - totalG).toFixed(0);
            document.getElementById("sugerido").innerText = "R$ " + metaSug.toFixed(0);
        }

        function salvar(data, u, p) { fetch("/ganho-detalhado", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({data, uber: Number(u), p99: Number(p)}) }).then(carregar); }
        function toggleDia(data) { fetch("/toggle-dia", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({data, ativo: !diasAtivos[data]}) }).then(carregar); }
        function salvarConfig() { fetch("/config", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({meta: document.getElementById("meta_in").value, dias: document.getElementById("dias_in").value}) }).then(carregar); }
        function toggleTema() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        carregar();
    </script>
</body>
</html>
